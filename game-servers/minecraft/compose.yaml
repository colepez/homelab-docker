services:
  router:
    image: itzg/mc-router
    restart: unless-stopped
    environment:
      IN_DOCKER: true
      # router-wide default stays off (zinnberlycraft/foreverworld haven't
      # opted in) - atm10 overrides it back on via its own
      # mc-router.auto-scale-down label now that its Chunky pregen is done
      AUTO_SCALE_DOWN: false
      AUTO_SCALE_UP: true
      AUTO_SCALE_DOWN_AFTER: 2h
      AUTO_SCALE_ASLEEP_MOTD: "Server is asleep. Join again to wake it up!"
      API_BINDING: ":8080"
      METRICS_BACKEND: prometheus
      RECORD_LOGINS: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
  zinnberlycraft:
    image: itzg/minecraft-server:latest
    environment:
      EULA: "TRUE"
      # Fabric adds BlueMap for the live map; it's server-side only so
      # vanilla clients still connect exactly as before.
      TYPE: FABRIC
      VERSION: "26.2"
      VIEW_DISTANCE: "12"
      MOTD: "§l§cWelcome§r to our §aAwesome§r Server"
    volumes:
      - /srv/docker/game-servers/minecraft/zinnberlycraft/data:/data
    restart: unless-stopped
    labels:
      mc-router.host: "${ZINNBERLYCRAFT_HOST}"
    networks:
      - edge
  foreverworld:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"
      MOTD: "${FOREVERWORLD_MOTD}"
      SIMULATION_DISTANCE: "12"
      VIEW_DISTANCE: "12"
      VERSION: "26.2"
      difficulty: "normal"
    labels:
      mc-router.host: "${FOREVERWORLD_HOST}"
    volumes:
      - /srv/docker/game-servers/minecraft/forever/data:/data
    networks:
      - edge
  atm10:
    # ATM10 targets MC 1.21 / NeoForge, which wants Java 21
    image: itzg/minecraft-server:java21
    environment:
      EULA: "TRUE"
      TYPE: CURSEFORGE
      # pre-downloaded server-pack zip, placed directly in this service's
      # data dir (bind-mounted below) - no CurseForge API key needed for
      # this path (that's only required by the AUTO_CURSEFORGE fetch-by-URL
      # platform type, which this isn't using)
      CF_SERVER_MOD: ServerFiles-7.1.zip
      SEED: "1568897881445927183"
      MOTD: "${ATM10_MOTD}"
      VIEW_DISTANCE: "10"
      DIFFICULTY: "normal"
      ALLOW_FLIGHT: "TRUE"
      MEMORY: "8G"
      USE_AIKAR_FLAGS: "TRUE"
      MAX_TICK_TIME: "-1"
    mem_limit: 10g
    labels:
      mc-router.host: "${ATM10_HOST}"
      # router-wide AUTO_SCALE_DOWN is off (see router service comment,
      # still needed for zinnberlycraft/foreverworld) - override it on
      # just this container now that the Chunky pregen run is finished
      mc-router.auto-scale-down: "true"
    volumes:
      - /srv/docker/game-servers/minecraft/atm10/data:/data
    restart: unless-stopped
    networks:
      - edge
