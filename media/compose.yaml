services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_WIREGUARD_ADDRESSES}
      - SERVER_CITIES=${MULLVAD_SERVER_CITIES}
    networks:
      - edge

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PEERPORT=${TRANSMISSION_PEER_PORT}
    volumes:
      - /srv/docker/media/transmission/data:/config
      - /mnt/media:/mnt/media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/docker/media/prowlarr/data:/config
    networks:
      - edge

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/docker/media/sonarr/data:/config
      - /mnt/media:/mnt/media
    networks:
      - edge

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/docker/media/radarr/data:/config
      - /mnt/media:/mnt/media
    networks:
      - edge

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
      - VERSION=docker
    volumes:
      - /srv/docker/media/plex/data:/config
      - /srv/docker/media/plex/transcode:/transcode
      - /mnt/media:/mnt/media
    networks:
      - edge
    # Uncomment to enable Intel Quick Sync hardware transcoding, if the host has a
    # compatible iGPU - cuts Plex's RAM/CPU usage per stream substantially versus
    # software transcoding.
    # devices:
    #   - /dev/dri:/dev/dri

networks:
  edge:
    name: edge
    external: true
