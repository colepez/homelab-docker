services:
  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    networks:
      - edge
    environment:
      - TZ=${TZ}
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    networks:
      - edge
    ports:
      - "25565:25565"
      - "34197:34197/udp"
    volumes:
      - /srv/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /srv/docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /srv/docker/nginx/streams.d:/etc/nginx/streams.d:ro
      
networks:
  edge:
    name: edge
    driver: bridge
