services:
  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - edge
    environment:
      - TZ=${TZ}
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    networks:
      - edge
    ports:
      - "25565:25565"
      - "34197:34197/udp"
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "8444:8444"
      - "9444:9444"
    volumes:
      - /srv/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /srv/docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /srv/docker/nginx/streams.d:/etc/nginx/streams.d:ro
      - /srv/docker/nginx/certs:/etc/nginx/certs:ro

      
networks:
  edge:
    name: edge
    driver: bridge
