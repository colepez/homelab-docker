services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - HOMEPAGE_VAR_TRUENAS_KEY=${HOMEPAGE_VAR_TRUENAS_KEY}
      - HOMEPAGE_VAR_PROXMOX_TOKEN_ID=${HOMEPAGE_VAR_PROXMOX_TOKEN_ID}
      - HOMEPAGE_VAR_PROXMOX_SECRET=${HOMEPAGE_VAR_PROXMOX_SECRET}
      - HOMEPAGE_VAR_PBS_TOKEN_ID=${HOMEPAGE_VAR_PBS_TOKEN_ID}
      - HOMEPAGE_VAR_PBS_SECRET=${HOMEPAGE_VAR_PBS_SECRET}
      - HOMEPAGE_VAR_PORTAINER_KEY=${HOMEPAGE_VAR_PORTAINER_KEY}
      - HOMEPAGE_VAR_UNIFI_API_KEY=${HOMEPAGE_VAR_UNIFI_API_KEY}
    volumes:
      - /srv/docker/dashboards/homepage/:/app/config
      - /srv/docker/dashboards/homepage/images:/app/public/images:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge

networks:
  edge:
    name: edge
    external: true
